  <text x="492" y="492" fill="#64716b" font-family="Segoe UI, Arial" font-size="13">内容预览</text>
  <text x="930" y="492" fill="#64716b" font-family="Segoe UI, Arial" font-size="13">处理方式</text>
  <text x="1130" y="492" fill="#64716b" font-family="Segoe UI, Arial" font-size="13">状态</text>

  <g font-family="Segoe UI, Arial" font-size="14">
    <text x="344" y="548" fill="#1e2d26">14:32</text>
    <text x="492" y="548" fill="#20312a">请帮我整理一下今天会议里面关于语音输入软件...</text>
    <text x="930" y="548" fill="#20312a">本地 ASR + API 整理</text>
    <rect x="1130" y="526" width="72" height="28" rx="14" fill="#dcf7e7"/>
    <text x="1148" y="546" fill="#167246">已输入</text>
    <text x="1228" y="548" fill="#1f8f5f">复制</text>

    <line x1="324" y1="578" x2="1296" y2="578" stroke="#e5ece8"/>
    <text x="344" y="626" fill="#1e2d26">14:18</text>
    <text x="492" y="626" fill="#20312a">本地模型可不可以呢另外我想要快捷键和鼠标...</text>
    <text x="930" y="626" fill="#20312a">豆包 ASR + DeepSeek</text>
    <rect x="1130" y="604" width="72" height="28" rx="14" fill="#fff3d8"/>
    <text x="1148" y="624" fill="#8a5a00">已保存</text>
    <text x="1228" y="626" fill="#1f8f5f">复制</text>

    <line x1="324" y1="656" x2="1296" y2="656" stroke="#e5ece8"/>
    <text x="344" y="704" fill="#1e2d26">13:55</text>
    <text x="492" y="704" fill="#20312a">输入失败但记录已保留，用户可以在这里再次复制...</text>
    <text x="930" y="704" fill="#20312a">本地 ASR</text>
    <rect x="1130" y="682" width="88" height="28" rx="14" fill="#ffe6e3"/>
    <text x="1148" y="702" fill="#a33a2d">粘贴失败</text>
    <text x="1228" y="704" fill="#1f8f5f">重试</text>
  </g>
